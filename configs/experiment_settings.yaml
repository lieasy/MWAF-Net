project:
  dataset: ZCHSound
  release_stage: review_stage_public_package
  withheld_until: manuscript_acceptance

data_preparation:
  split_level: file
  split_ratio:
    train: 0.8
    validation: 0.1
    test: 0.1
  stratified: true
  random_seed: 42
  target_sampling_rate_hz: 1000
  segment_seconds: 1.5
  minimum_audio_seconds: 1.0
  segment_overlap: 0.0
  normalization:
    method: train_split_mean_std
    apply_to: [train, validation, test]

tasks:
  clean_binary:
    audio_dir: raw_data/clean Heartsound Data
    label_file: raw_data/Clean_label_used.csv
    output_dir: dataset/clean_binary_segment
    num_classes: 2
  noise_binary:
    audio_dir: raw_data/Noise Heartsound Data Details
    label_file: raw_data/Noise_label_used.csv
    output_dir: dataset/noise_binary_segment
    num_classes: 2
  clean_multiclass:
    audio_dir: raw_data/clean Heartsound Data
    label_file: raw_data/Clean_label_multi_class.csv
    output_dir: dataset/clean_multiclass_segment
    num_classes: 5
    class_mapping:
      NORMAL: 0
      ASD: 1
      PDA: 2
      PFO: 3
      VSD: 4

training:
  optimizer: Adam
  learning_rate: 0.001
  weight_decay: 0.000001
  epochs: 200
  batch_size: 16
  num_workers_windows: 0
  warmup_epochs: 5
  grad_accum_steps: 2
  grad_clip_norm: 0.5
  mixup_alpha: 0.2
  early_stopping_patience: 50
  loss: focal_smoothing

evaluation:
  metrics:
    - accuracy
    - uar
    - weighted_f1
    - confusion_matrix
  repeated_runs:
    seeds: [42]
    note: Add the final repeated-run seed list after manuscript acceptance if it is part of the paper.

release_policy:
  public_now:
    - dataset_preparation_protocol
    - environment_requirements
    - split_strategy
    - high_level_experiment_settings
  withheld_now:
    - proposed_model_source
    - ablation_implementation
    - unpublished_result_tables
    - trained_checkpoints
  full_release_trigger: after_acceptance_or_reviewer_request

